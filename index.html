<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#6e2a33; --paper-2:#5c222a; --card:#7c313b;
  --ink:#f4eee3; --ink-2:#e4d2b4; --ink-3:rgba(244,238,227,.55);
  --line:rgba(244,238,227,.16); --line-2:rgba(244,238,227,.30);
  --accent:#b5562f; --accent-2:#4c5a3e; --accent-ink:#f4eee3;
  --accent-light:#d8895d; --accent-soft:rgba(181,86,47,.22); --accent-line:rgba(181,86,47,.5);
  --clay:#e6a07b;
  --input-bg:#f4eee3; --input-text:#332420; --input-line:rgba(51,36,32,.25);
  --btn-bg:rgba(244,238,227,.08); --btn-bg-h:rgba(244,238,227,.16);
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; line-height:1.55;
  -webkit-print-color-adjust:exact; print-color-adjust:exact;
}
.wrap{max-width:880px; margin:0 auto; padding:40px 20px 72px;}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--accent-light);font-weight:500;}

.head{border-bottom:1px solid var(--line-2);padding-bottom:22px;margin-bottom:34px;
  display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;}
.head h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:30px;line-height:1.04;
  letter-spacing:-.02em;margin:8px 0 0;max-width:560px;color:var(--ink);}
.head p{color:var(--ink-2);font-size:13.5px;margin:6px 0 0;max-width:520px;}
.stamp{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3);text-align:right;white-space:nowrap;}
.head-left{display:flex;align-items:center;gap:18px;min-width:0;}
.head-txt{min-width:0;}
.brandmark{flex:none;width:96px;height:96px;display:flex;align-items:center;justify-content:center;}
.brandmark img{width:100%;height:100%;object-fit:contain;display:block;}
@media (max-width:560px){ .brandmark{width:72px;height:72px;} }

.prog{display:flex;margin:0 0 30px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--paper-2);}
.prog button{flex:1;border:0;background:transparent;cursor:pointer;padding:11px 6px 9px;
  border-right:1px solid var(--line);text-align:center;transition:background .18s;
  font-family:'IBM Plex Mono',monospace;color:var(--ink-3);min-width:0;}
.prog button:last-child{border-right:0;}
.prog button:hover{background:var(--btn-bg-h);}
.prog .n{font-size:12px;font-weight:600;display:block;}
.prog .l{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;display:block;
  margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prog button.on{background:var(--accent);color:#fff;}
.prog button.done{color:var(--accent-light);}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:30px 30px 26px;box-shadow:0 6px 20px rgba(0,0,0,.12);}
.sechead{margin-bottom:22px;}
.sechead h2{font-family:'Archivo',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.01em;margin:6px 0 0;color:var(--ink);}
.field{margin-bottom:20px;}
.field:last-of-type{margin-bottom:0;}
.field label{display:block;font-weight:600;font-size:14px;margin-bottom:6px;color:var(--ink);}
.field .req{color:var(--clay);margin-left:3px;}
.field .hint{display:block;font-size:12px;color:var(--ink-2);margin:-2px 0 7px;font-family:'IBM Plex Mono',monospace;}
.field input,.field textarea,.field select{
  width:100%;background:var(--input-bg);border:1px solid var(--input-line);border-radius:8px;
  padding:11px 12px;font-family:inherit;font-size:14px;color:var(--input-text);
  transition:border-color .15s,box-shadow .15s;resize:vertical;}
.field textarea{min-height:78px;}
.field input::placeholder,.field textarea::placeholder{color:rgba(51,36,32,.42);}
.field input:focus,.field textarea:focus,.field select:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:14px;}
.btn{font-family:'Archivo',sans-serif;font-weight:600;font-size:14px;cursor:pointer;border-radius:8px;
  padding:12px 22px;border:1px solid var(--line-2);background:var(--btn-bg);color:var(--ink);
  transition:transform .12s,background .15s;}
.btn:hover{background:var(--btn-bg-h);}
.btn:active{transform:translateY(1px);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{filter:brightness(1.08);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.warn{color:var(--clay);font-size:12.5px;font-family:'IBM Plex Mono',monospace;margin-top:12px;}
.priv{font-size:12px;color:var(--ink-3);font-family:'IBM Plex Mono',monospace;text-align:center;margin-top:26px;}
.aibox{margin-top:22px;border:1px dashed var(--line-2);border-radius:10px;overflow:hidden;}
.ai-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:var(--btn-bg);border:0;color:var(--ink);cursor:pointer;padding:12px 16px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;}
.ai-toggle:hover{background:var(--btn-bg-h);}
.ai-state{color:var(--ink-2);font-size:10.5px;letter-spacing:.04em;}
.ai-body{padding:2px 16px 18px;}
.ai-note{font-size:13px;color:var(--ink-2);margin:10px 0 14px;line-height:1.5;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.aibox label{display:block;font-size:12.5px;font-weight:600;color:var(--ink);}
.aibox select,.aibox input[type=text],.aibox input[type=password]{
  width:100%;margin-top:5px;background:var(--input-bg);color:var(--input-text);
  border:1px solid var(--input-line);border-radius:8px;padding:10px 11px;font-family:inherit;font-size:13.5px;}
.aibox select:focus,.aibox input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.ai-key{display:block;margin-top:12px;}
.ai-remember{display:flex;align-items:center;gap:8px;margin-top:12px;font-weight:500;color:var(--ink-2);}
.ai-remember input{width:auto;margin:0;}
.ai-warn{font-size:11.5px;color:var(--ink-2);font-family:'IBM Plex Mono',monospace;line-height:1.55;margin:14px 0 0;}
@media(max-width:560px){ .ai-grid{grid-template-columns:1fr;} }
.srcbadge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;padding:6px 12px;border-radius:999px;background:var(--btn-bg);color:var(--ink-2);
  border:1px solid var(--line);margin-bottom:18px;}
.srcbadge.ia{background:var(--accent-soft);color:var(--ink);border-color:var(--accent-line);}
.srcnotice{font-size:12.5px;color:var(--clay);font-family:'IBM Plex Mono',monospace;margin:-8px 0 18px;}

.load{text-align:center;padding:70px 20px;}
.spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent-light);border-radius:50%;margin:0 auto 20px;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
.load p{color:var(--ink-2);font-size:14px;}

.block{margin-bottom:34px;}
.block h3{font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em;
  margin:0 0 14px;padding-bottom:9px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;color:var(--ink);}
.block h3 .idx{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent-light);font-weight:500;}
.resumo{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:12px;
  padding:22px 24px;font-size:15px;line-height:1.6;color:var(--ink);box-shadow:0 6px 20px rgba(0,0,0,.12);}
.sub{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.sub h4{font-family:'Archivo',sans-serif;font-weight:600;font-size:14.5px;margin:0 0 5px;color:var(--ink);}
.sub p{margin:0;font-size:14px;color:var(--ink-2);}
.ins{display:flex;gap:13px;padding:15px 0;border-bottom:1px solid var(--line);}
.ins:last-child{border-bottom:0;}
.pill{flex:none;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 9px;border-radius:999px;height:fit-content;font-weight:600;}
.pill.alta{background:var(--accent);color:#fff;}
.pill.media{background:var(--accent-2);color:#fff;}
.pill.baixa{background:rgba(244,238,227,.15);color:var(--ink-2);}
.ins h4{font-family:'Archivo',sans-serif;font-weight:600;font-size:15px;margin:0 0 4px;color:var(--ink);}
.ins p{margin:0;font-size:13.5px;color:var(--ink-2);}

.pal{margin-bottom:26px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);}
.pal-head{padding:15px 18px;border-bottom:1px solid var(--line);}
.pal-head .nm{font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;color:var(--ink);}
.pal-head .cc{font-size:13px;color:var(--ink-2);margin-top:3px;}
.chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}
.chip{border-right:1px solid var(--line);position:relative;}
.chip:last-child{border-right:0;}
.chip .swatch{height:88px;cursor:copy;display:flex;align-items:flex-end;padding:8px;transition:filter .15s;}
.chip .swatch:hover{filter:brightness(1.04);}
.chip .hx{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:3px 6px;border-radius:5px;}
.chip .meta{padding:9px 10px 12px;}
.chip .cn{font-weight:600;font-size:12.5px;color:var(--ink);}
.chip .cu{font-size:11.5px;color:var(--ink-2);margin-top:2px;line-height:1.4;}
.copied{position:absolute;top:8px;right:8px;background:var(--cafe,#332420);color:#fff;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:3px 7px;border-radius:5px;}

.foot{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-3);font-family:'IBM Plex Mono',monospace;}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:30px;}

@media (max-width:560px){ .card{padding:22px 18px;} .head h1{font-size:24px;} .prog .l{display:none;} }
@media (prefers-reduced-motion:reduce){ .spin{animation:none;} .btn:active{transform:none;} }

/* Impressão: documento em fundo claro e texto escuro, independente do tema escuro da tela */
@media print{
  body{background:#fff !important;color:#211f1b !important;}
  .no-print{display:none !important;}
  .card,.pal,.sub,.resumo{background:#fff !important;border:1px solid #cfcabf !important;box-shadow:none !important;}
  .resumo{border-left:3px solid #b5562f !important;color:#211f1b !important;}
  .head h1,.sechead h2,.block h3,.sub h4,.ins h4,.pal-head .nm,.chip .cn{color:#211f1b !important;}
  .head p,.sub p,.ins p,.chip .cu,.pal-head .cc,.foot,.field .hint{color:#4a4a4a !important;}
  .eyebrow,.block h3 .idx{color:#8a3d1c !important;}
  .block h3{border-bottom:1px solid #cfcabf !important;}
  .pill.alta{background:#b5562f !important;color:#fff !important;}
  .pill.media{background:#4c5a3e !important;color:#fff !important;}
  .pill.baixa{background:#eceae3 !important;color:#555 !important;}
  .brandmark{background:transparent !important;border:0 !important;box-shadow:none !important;}
  .srcbadge{background:#eee !important;color:#555 !important;border-color:#ccc !important;}
  .srcbadge.ia{background:#f1e6df !important;color:#7a3d22 !important;border-color:#e0c3b3 !important;}
  .block,.pal{break-inside:avoid;}
}
</style>
</head>
<body>
<div class="wrap"><div id="app"></div></div>

<script>
/* ============================================================== *
 *  TEMA — aplica a paleta do estúdio às variáveis de CSS
 * ============================================================== */
(function setTheme(){
  var T = THEME, r = document.documentElement.style;
  var L = T.textLight, A = T.accent;
  var ah = hexToHsl(A);
  var accentLight = hslToHex(ah.h, clamp(ah.s-6,30,80), clamp(ah.l+16,52,72));
  r.setProperty("--paper",   T.bg);
  r.setProperty("--paper-2", T.panelDark);
  r.setProperty("--card",    T.panel);
  r.setProperty("--ink",     L);
  r.setProperty("--ink-2",   T.textWarm);
  r.setProperty("--ink-3",   rgba(L,.55));
  r.setProperty("--line",    rgba(L,.16));
  r.setProperty("--line-2",  rgba(L,.30));
  r.setProperty("--accent",  A);
  r.setProperty("--accent-2",T.accent2);
  r.setProperty("--accent-ink", L);
  r.setProperty("--accent-light", accentLight);
  r.setProperty("--accent-soft", rgba(A,.22));
  r.setProperty("--accent-line", rgba(A,.5));
  r.setProperty("--clay",    accentLight);
  r.setProperty("--input-bg",   T.inputBg);
  r.setProperty("--input-text", T.inputText);
  r.setProperty("--input-line", rgba(T.inputText,.25));
  r.setProperty("--btn-bg",   rgba(L,.08));
  r.setProperty("--btn-bg-h", rgba(L,.16));
  r.setProperty("--cafe",     T.cafe);
})();

/* ============================================================== *
 *  ESTRUTURA DO FORMULÁRIO
 * ============================================================== */
var STEPS = [
  { eyebrow:"Identidade", title:"Quem é a marca", fields:[
    {id:"nome", label:"Nome da marca", type:"text", required:true, ph:"Ex.: Atelier Norte"},
    {id:"segmento", label:"Segmento / setor", type:"text", required:true, ph:"Ex.: Moda autoral, gastronomia, varejo de luxo…"},
    {id:"anos", label:"Anos de mercado", type:"text", ph:"Ex.: 12 anos"},
    {id:"publico", label:"Público-alvo principal", type:"textarea", ph:"Quem compra, faixa, comportamento, o que valoriza…"},
  ]},
  { eyebrow:"Cores", title:"Cores e identidade visual", fields:[
    {id:"cores_principais", label:"Cores principais da marca", hint:"Use HEX se souber — ex.: #1A1A1A, #C0392B", type:"textarea", required:true, ph:"#1A1A1A, #C0392B, branco quente…"},
    {id:"cores_secundarias", label:"Cores secundárias ou de apoio", type:"textarea", ph:"Tons neutros, acentos, materiais…"},
    {id:"identidade_atual", label:"A identidade visual atual representa bem a marca?", type:"select", options:["Sim, totalmente","Em parte","Não representa","Está em revisão"]},
  ]},
  { eyebrow:"Essência", title:"Valores, missão e cultura", fields:[
    {id:"missao", label:"Missão da marca", type:"textarea", ph:"Por que a marca existe e o que busca entregar…"},
    {id:"valores", label:"Valores centrais", type:"textarea", ph:"Os princípios que guiam as decisões…"},
    {id:"personalidade", label:"Personalidade da marca em 3 palavras", type:"text", ph:"Ex.: sóbria, calorosa, precisa"},
    {id:"sensacao", label:"Que sensação o cliente deve ter ao entrar em contato com a marca?", type:"textarea", ph:"Acolhimento, sofisticação, energia, confiança…"},
  ]},
  { eyebrow:"Futuro", title:"Prospecção e direção", fields:[
    {id:"objetivos", label:"Objetivos para os próximos 3 a 5 anos", type:"textarea", ph:"Crescimento, posicionamento, novos públicos…"},
    {id:"expansao", label:"Planos de expansão", type:"textarea", ph:"Novas unidades, e-commerce, franquias, exportação…"},
    {id:"percepcao_futura", label:"Como a marca quer ser percebida no futuro?", type:"textarea", ph:"A reputação e o lugar que deseja ocupar…"},
  ]},
  { eyebrow:"Ambiente", title:"Arquitetura e gargalos do espaço", fields:[
    {id:"espaco_atual", label:"Como é o espaço físico atual?", hint:"Loja, escritório, showroom, ateliê…", type:"textarea", ph:"Tamanho aproximado, layout, pé-direito, ambientes…"},
    {id:"problemas_ambiente", label:"Quais problemas o ambiente atual gera?", type:"textarea", ph:"Fluxo confuso, iluminação ruim, conforto térmico/acústico, pouca exposição de produto…"},
    {id:"ambiente_comunica", label:"O ambiente comunica a identidade da marca?", type:"select", options:["Sim, com clareza","Em parte","Não comunica","Ainda não temos espaço físico"]},
    {id:"limitacoes", label:"Limitações de espaço, orçamento ou estrutura", type:"textarea", ph:"Restrições do imóvel, verba, prazos, normas…"},
  ]},
  { eyebrow:"Comunicação", title:"Comunicação visual", fields:[
    {id:"sinalizacao", label:"Como está a sinalização e a orientação no espaço (wayfinding)?", type:"textarea", ph:"Placas, direcionamento, leitura de preços, identificação de áreas…"},
    {id:"materiais", label:"Materiais de comunicação em uso", type:"textarea", ph:"Fachada, vitrine, impressos, embalagens, digital, redes…"},
    {id:"desafios_cv", label:"Principais desafios de comunicação visual hoje", type:"textarea", ph:"Inconsistência, ruído, baixa memorização, falta de hierarquia…"},
  ]},
];

/* ============================================================== *  ESTADO  * ============================================================== */
var state = { phase:"form", step:0, answers:{}, result:null, showWarn:false, copied:"", aiOpen:false, ai:{provider:"",key:"",model:"",remember:false} };
try{ var saved = localStorage.getItem("diag_marca"); if(saved) state.answers = JSON.parse(saved); }catch(e){}
try{ var sk = localStorage.getItem("diag_ai"); if(sk){ var o=JSON.parse(sk); state.ai.provider=o.provider||""; state.ai.model=o.model||""; if(o.remember){ state.ai.key=o.key||""; state.ai.remember=true; } } }catch(e){}
function persist(){ try{ localStorage.setItem("diag_marca", JSON.stringify(state.answers)); }catch(e){} }
function persistAI(){ try{ localStorage.setItem("diag_ai", JSON.stringify({provider:state.ai.provider,model:state.ai.model,remember:state.ai.remember,key:state.ai.remember?state.ai.key:""})); }catch(e){} }

/* ============================================================== *  RENDER  * ============================================================== */
var app = document.getElementById("app");
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function today(){ return new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"}); }
function brandName(){ return (state.answers.nome||"").trim() || "Sua marca"; }

function header(){
  var isRes = state.phase==="result";
  return '<header class="head"><div class="head-left">'
    + '<div class="brandmark"><img src="' + LOGO_SRC + '" alt="Logo do estúdio"></div>'
    + '<div class="head-txt">'
    + '<div class="eyebrow">Ferrabisk Estúdio · Diagnóstico de marca &amp; ambiente</div>'
    + '<h1>' + (isRes ? esc(brandName()) : "Briefing de marca, espaço e comunicação visual") + '</h1>'
    + (isRes ? "" : '<p>Um intake guiado para mapear identidade, cultura, ambiente físico e comunicação visual — e devolver análise, insights e paletas aplicáveis ao projeto.</p>')
    + '</div></div><div class="stamp">' + (isRes?"DIAGNÓSTICO":"FORMULÁRIO") + '<br>' + today() + '</div></header>';
}

function render(){
  var html = header();
  if(state.phase==="form")    html += renderForm();
  if(state.phase==="loading") html += renderLoading();
  if(state.phase==="result")  html += renderResult();
  app.innerHTML = html;
  bind();
}

function renderForm(){
  var s = STEPS[state.step];
  var prog = '<nav class="prog no-print">' + STEPS.map(function(st,i){
    var cls = i===state.step ? "on" : i<state.step ? "done" : "";
    return '<button data-go="'+i+'" class="'+cls+'"><span class="n">'+String(i+1).padStart(2,"0")+'</span><span class="l">'+esc(st.eyebrow)+'</span></button>';
  }).join("") + '</nav>';

  var fields = s.fields.map(function(f){
    var v = esc(state.answers[f.id]||"");
    var lbl = '<label>'+esc(f.label)+(f.required?'<span class="req">*</span>':'')+'</label>'
            + (f.hint?'<span class="hint">'+esc(f.hint)+'</span>':'');
    var ctrl;
    if(f.type==="textarea") ctrl = '<textarea data-id="'+f.id+'" placeholder="'+esc(f.ph||"")+'">'+v+'</textarea>';
    else if(f.type==="select"){
      ctrl = '<select data-id="'+f.id+'"><option value="">Selecione…</option>'
        + f.options.map(function(o){return '<option '+((state.answers[f.id]||"")===o?"selected":"")+'>'+esc(o)+'</option>';}).join("") + '</select>';
    } else ctrl = '<input type="text" data-id="'+f.id+'" value="'+v+'" placeholder="'+esc(f.ph||"")+'">';
    return '<div class="field">'+lbl+ctrl+'</div>';
  }).join("");

  var warn = state.showWarn && missing(state.step).length ? '<p class="warn">Preencha os campos obrigatórios (*) para avançar.</p>' : "";
  var last = state.step===STEPS.length-1;
  var aiPanel = last ? renderAiPanel() : "";
  var nav = '<div class="nav no-print">'
    + (state.step>0 ? '<button class="btn" data-go="'+(state.step-1)+'">← Voltar</button>' : '<span></span>')
    + '<button class="btn primary" data-next="1">'+(last?"Gerar diagnóstico":"Avançar →")+'</button></div>';

  return prog + '<section class="card"><div class="sechead"><div class="eyebrow">Etapa '+(state.step+1)+' de '+STEPS.length+'</div><h2>'+esc(s.title)+'</h2></div>'
    + fields + warn + aiPanel + nav + '</section>'
    + '<p class="priv">As respostas ficam apenas neste navegador. Nada é enviado para fora.</p>';
}

function renderAiPanel(){
  var ai = state.ai, on = !!(ai.provider && ai.key.trim());
  var head = '<button class="ai-toggle" data-aitoggle="1"><span>Modo IA · opcional</span><span class="ai-state">'+(on?"ativado":"desligado · modo local")+'</span></button>';
  if(!state.aiOpen) return '<div class="aibox">'+head+'</div>';
  var prov = ai.provider;
  var body = '<div class="ai-body">'
    + '<p class="ai-note">Por padrão o diagnóstico é gerado <b>offline, sem IA</b>. Opcionalmente, use sua própria chave de um provedor para enriquecer o texto da análise — as paletas continuam calculadas localmente.</p>'
    + '<div class="ai-grid">'
    + '<label>Provedor<select data-ai="provider"><option value="">Nenhum (offline)</option>'
    +   '<option value="anthropic"'+(prov==="anthropic"?" selected":"")+'>Anthropic (Claude)</option>'
    +   '<option value="openai"'+(prov==="openai"?" selected":"")+'>OpenAI</option></select></label>'
    + '<label>Modelo<input type="text" data-ai="model" value="'+esc(ai.model)+'" placeholder="'+(prov==="openai"?"gpt-4o-mini":"claude-sonnet-4-6")+'"></label>'
    + '</div>'
    + '<label class="ai-key">Chave de API<input type="password" data-ai="key" value="'+esc(ai.key)+'" placeholder="cole sua chave aqui" autocomplete="off"></label>'
    + '<label class="ai-remember"><input type="checkbox" data-ai="remember"'+(ai.remember?" checked":"")+'> Lembrar a chave neste navegador</label>'
    + '<p class="ai-warn">A chave fica apenas no seu navegador e é enviada direto ao provedor escolhido. Não use em computadores compartilhados. Se a chamada falhar (chave inválida, rede ou bloqueio do navegador), o diagnóstico é gerado normalmente em modo local.</p>'
    + '</div>';
  return '<div class="aibox open">'+head+body+'</div>';
}

function renderLoading(){
  return '<section class="card load"><div class="eyebrow">Compondo</div><div class="spin"></div>'
    + '<p>Cruzando identidade, ambiente e comunicação visual<br>e calculando as paletas para '+esc(brandName())+'…</p></section>';
}

function renderResult(){
  var r = state.result;
  var html = '<div class="actions no-print">'
    + '<button class="btn primary" data-print="1">Imprimir / Salvar PDF</button>'
    + '<button class="btn" data-edit="1">Editar respostas</button>'
    + '<button class="btn" data-reset="1">Nova marca</button></div>';
  html += (r.source==="ia")
    ? '<div class="srcbadge ia">Análise enriquecida por IA · '+(state.ai.provider==="openai"?"OpenAI":"Anthropic")+'</div>'
    : '<div class="srcbadge">Análise gerada localmente · offline</div>';
  if(r.notice) html += '<div class="srcnotice">'+esc(r.notice)+'</div>';
  html += '<div class="block"><h3><span class="idx">01</span> Resumo</h3><div class="resumo">'+esc(r.resumo)+'</div></div>';
  html += '<div class="block"><h3><span class="idx">02</span> Análise aprofundada</h3>'
    + r.analise.map(function(b){return '<div class="sub"><h4>'+esc(b.titulo)+'</h4><p>'+esc(b.texto)+'</p></div>';}).join("") + '</div>';
  html += '<div class="block"><h3><span class="idx">03</span> Insights de melhoria</h3>'
    + r.insights.map(function(i){var p=normPri(i.prioridade);return '<div class="ins"><span class="pill '+p+'">'+p+'</span><div><h4>'+esc(i.titulo)+'</h4><p>'+esc(i.texto)+'</p></div></div>';}).join("") + '</div>';
  html += '<div class="block"><h3><span class="idx">04</span> Paletas de cor sugeridas</h3>'
    + r.paletas.map(function(pal){
        var chips = pal.cores.map(function(c){
          var light = isLight(c.hex);
          var hxStyle = light ? 'background:rgba(255,255,255,.82);color:#222;' : 'background:rgba(0,0,0,.34);color:#fff;';
          var cop = state.copied===c.hex ? '<span class="copied">copiado</span>' : '';
          return '<div class="chip"><div class="swatch" data-copy="'+c.hex+'" style="background:'+c.hex+'" title="Copiar HEX">'
            + '<span class="hx" style="'+hxStyle+'">'+c.hex.toUpperCase()+'</span></div>'+cop
            + '<div class="meta"><div class="cn">'+esc(c.nome)+'</div><div class="cu">'+esc(c.uso)+'</div></div></div>';
        }).join("");
        return '<div class="pal"><div class="pal-head"><div class="nm">'+esc(pal.nome)+'</div><div class="cc">'+esc(pal.conceito)+'</div></div><div class="chips">'+chips+'</div></div>';
      }).join("") + '</div>';
  html += '<div class="foot">'+esc(brandName().toUpperCase())+' · Diagnóstico gerado em '+today()+' · Clique numa amostra para copiar o HEX.</div>';
  return html;
}

/* ============================================================== *  EVENTOS  * ============================================================== */
function missing(step){ return STEPS[step].fields.filter(function(f){ return f.required && !((state.answers[f.id]||"").trim()); }); }
function bind(){
  app.querySelectorAll("[data-id]").forEach(function(el){
    el.addEventListener("input", function(){ state.answers[el.getAttribute("data-id")] = el.value; persist(); });
    el.addEventListener("change", function(){ state.answers[el.getAttribute("data-id")] = el.value; persist(); });
  });
  app.querySelectorAll("[data-go]").forEach(function(el){
    el.addEventListener("click", function(){ state.step = +el.getAttribute("data-go"); state.showWarn=false; scrollTop(); render(); });
  });
  var nextBtn = app.querySelector("[data-next]"); if(nextBtn) nextBtn.addEventListener("click", next);
  bindIf("[data-print]", function(){ window.print(); });
  bindIf("[data-edit]", function(){ state.phase="form"; render(); });
  bindIf("[data-reset]", function(){ state.answers={}; state.result=null; state.step=0; state.phase="form"; persist(); render(); });
  var at = app.querySelector("[data-aitoggle]"); if(at) at.addEventListener("click", function(){ state.aiOpen=!state.aiOpen; render(); });
  app.querySelectorAll("[data-ai]").forEach(function(el){
    var k = el.getAttribute("data-ai");
    var ev = (el.type==="checkbox"||el.tagName==="SELECT") ? "change" : "input";
    el.addEventListener(ev, function(){
      state.ai[k] = (el.type==="checkbox") ? el.checked : el.value;
      persistAI();
      if(el.tagName==="SELECT") render();
    });
  });
  app.querySelectorAll("[data-copy]").forEach(function(el){
    el.addEventListener("click", function(){
      var hex = el.getAttribute("data-copy");
      try{ navigator.clipboard && navigator.clipboard.writeText(hex); }catch(e){}
      state.copied = hex; render(); setTimeout(function(){ state.copied=""; render(); }, 1100);
    });
  });
}
function bindIf(sel, fn){ var el=app.querySelector(sel); if(el) el.addEventListener("click", fn); }
function scrollTop(){ window.scrollTo({top:0,behavior:"smooth"}); }
function next(){
  if(missing(state.step).length){ state.showWarn=true; render(); return; }
  if(state.step < STEPS.length-1){ state.step++; state.showWarn=false; scrollTop(); render(); }
  else generate();
}
function generate(){ state.phase="loading"; scrollTop(); render(); runGenerate(); }

async function runGenerate(){
  var local = buildReport(state.answers);
  var res = { resumo:local.resumo, analise:local.analise, insights:local.insights, paletas:local.paletas, source:"local", notice:"" };
  if(state.ai.provider && state.ai.key.trim()){
    try{
      var ai = await callAI(state.answers);
      if(ai && ai.resumo){
        res.resumo  = ai.resumo;
        res.analise = (ai.analise && ai.analise.length) ? ai.analise : local.analise;
        res.insights= (ai.insights && ai.insights.length) ? ai.insights : local.insights;
        res.source  = "ia";
      } else throw new Error("resposta vazia");
    }catch(e){
      res.notice = "Não foi possível usar a IA ("+(e.message||"erro")+"). Diagnóstico gerado em modo local.";
    }
  } else {
    await new Promise(function(r){ setTimeout(r, 400); });
  }
  state.result = res; state.phase="result"; scrollTop(); render();
}

function buildAIPrompt(a){
  var lines=[];
  STEPS.forEach(function(s){ s.fields.forEach(function(f){ var v=(a[f.id]||"").trim(); if(v) lines.push("- "+f.label+": "+v); }); });
  return "Você é um consultor sênior de branding e arquitetura de ambientes, trabalhando para um estúdio de design. Com base nas respostas da marca abaixo, gere um diagnóstico em português do Brasil.\n\nRespostas da marca:\n"
    + lines.join("\n")
    + "\n\nResponda SOMENTE com um objeto JSON válido (sem markdown, sem cercas de código, sem texto antes ou depois) neste schema:\n"
    + '{ "resumo": "3 a 5 frases", "analise": [{"titulo":"...","texto":"2 a 4 frases"}], "insights": [{"titulo":"...","texto":"recomendação acionável","prioridade":"alta|media|baixa"}] }\n'
    + "Regras: 'analise' com 4 a 6 blocos cobrindo identidade, essência/cultura, ambiente físico e gargalos, comunicação visual e prospecção futura; 'insights' com 5 a 6 itens priorizados, focados em arquitetura de ambientes e comunicação visual. Seja específico e profissional; não invente fatos que não foram fornecidos.";
}

async function callAI(a){
  var prov = state.ai.provider, key = state.ai.key.trim();
  var model = state.ai.model.trim() || (prov==="openai" ? "gpt-4o-mini" : "claude-sonnet-4-6");
  var prompt = buildAIPrompt(a), text;
  if(prov==="anthropic"){
    var r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{ "content-type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({ model:model, max_tokens:2000, messages:[{role:"user",content:prompt}] })
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    var d = await r.json();
    text = (d.content||[]).map(function(b){return b.type==="text"?b.text:"";}).join("");
  } else if(prov==="openai"){
    var r2 = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{ "content-type":"application/json","authorization":"Bearer "+key },
      body: JSON.stringify({ model:model, temperature:0.6, messages:[{role:"system",content:"Você responde apenas com JSON válido em português do Brasil."},{role:"user",content:prompt}], response_format:{type:"json_object"} })
    });
    if(!r2.ok) throw new Error("HTTP "+r2.status);
    var d2 = await r2.json();
    text = d2.choices && d2.choices[0] && d2.choices[0].message ? d2.choices[0].message.content : "";
  } else throw new Error("provedor desconhecido");
  text = String(text).replace(/```json/gi,"").replace(/```/g,"").trim();
  var f=text.indexOf("{"), l=text.lastIndexOf("}");
  if(f<0||l<0) throw new Error("formato inesperado");
  return JSON.parse(text.slice(f,l+1));
}

function normPri(x){ var v=deaccent(String(x||"media")); if(v.indexOf("alt")===0) return "alta"; if(v.indexOf("baix")===0) return "baixa"; return "media"; }

/* ============================================================== *  MOTOR DE ANÁLISE (client-side)  * ============================================================== */
function buildReport(a){ return { resumo:buildResumo(a), analise:buildAnalise(a), insights:buildInsights(a), paletas:buildPaletas(a) }; }
function has(a,k){ return (a[k]||"").trim().length>0; }
function val(a,k){ return (a[k]||"").trim(); }

function buildResumo(a){
  var p=[], nome = val(a,"nome")||"A marca", ident = nome;
  if(has(a,"segmento")) ident += ", atuante em " + val(a,"segmento").toLowerCase();
  if(has(a,"anos")) ident += " há " + val(a,"anos");
  p.push(ident + ".");
  if(has(a,"personalidade")) p.push("Sua personalidade se traduz em " + val(a,"personalidade").toLowerCase() + ".");
  if(has(a,"publico")) p.push("Fala principalmente com " + val(a,"publico").toLowerCase() + ".");
  var idAt = val(a,"identidade_atual"), amb = val(a,"ambiente_comunica");
  if(idAt) p.push("Hoje a identidade visual " + ({"Sim, totalmente":"representa bem a marca","Em parte":"representa a marca apenas em parte","Não representa":"não representa a marca como deveria","Está em revisão":"está em processo de revisão"}[idAt]||"") + (amb && amb!=="Ainda não temos espaço físico" ? ", e o ambiente físico a comunica " + ({"Sim, com clareza":"com clareza","Em parte":"de forma parcial","Não comunica":"de forma insuficiente"}[amb]||"") : "") + ".");
  if(has(a,"objetivos")) p.push("Para os próximos anos, busca " + val(a,"objetivos").toLowerCase() + ".");
  return p.join(" ");
}
function buildAnalise(a){
  var out=[];
  var t1=[];
  if(has(a,"segmento")) t1.push("Como marca de " + val(a,"segmento").toLowerCase() + ", o posicionamento se sustenta na coerência entre o que promete e o que entrega no ponto de contato.");
  if(has(a,"publico")) t1.push("O público descrito (" + val(a,"publico").toLowerCase() + ") deve guiar tom, materiais e nível de acabamento.");
  if(val(a,"identidade_atual")==="Não representa"||val(a,"identidade_atual")==="Está em revisão") t1.push("Há um descompasso percebido entre identidade atual e essência — sinal claro de oportunidade de realinhamento.");
  if(t1.length) out.push({titulo:"Identidade e posicionamento", texto:t1.join(" ")});
  var t2=[];
  if(has(a,"missao")) t2.push("A missão (\""+val(a,"missao")+"\") é o eixo que deve aparecer traduzido em espaço e comunicação, não apenas no discurso.");
  if(has(a,"valores")) t2.push("Os valores — "+val(a,"valores").toLowerCase()+" — funcionam como critério para decidir materiais, gestos e detalhes.");
  if(has(a,"sensacao")) t2.push("A sensação desejada ("+val(a,"sensacao").toLowerCase()+") é o que arquitetura, luz e percurso precisam provocar fisicamente.");
  if(t2.length) out.push({titulo:"Essência e cultura", texto:t2.join(" ")});
  var t3=[];
  if(has(a,"espaco_atual")) t3.push("O espaço atual ("+val(a,"espaco_atual").toLowerCase()+") é o palco onde a marca se torna experiência.");
  if(has(a,"problemas_ambiente")) t3.push("Os gargalos relatados — "+val(a,"problemas_ambiente").toLowerCase()+" — tendem a corroer a percepção de qualidade antes mesmo do produto, e devem ser priorizados.");
  if(val(a,"ambiente_comunica")==="Não comunica"||val(a,"ambiente_comunica")==="Em parte") t3.push("O ambiente ainda não conta a história da marca por inteiro: há margem para que layout, materiais e luz passem a comunicar identidade de forma intencional.");
  if(has(a,"limitacoes")) t3.push("As limitações ("+val(a,"limitacoes").toLowerCase()+") pedem estratégia por prioridade: poucos gestos de alto impacto em vez de reforma total.");
  if(t3.length) out.push({titulo:"Ambiente físico e gargalos", texto:t3.join(" ")});
  var t4=[];
  if(has(a,"sinalizacao")) t4.push("Sobre orientação no espaço: "+val(a,"sinalizacao").toLowerCase()+". Wayfinding claro reduz atrito e reforça profissionalismo.");
  if(has(a,"materiais")) t4.push("Os materiais em uso ("+val(a,"materiais").toLowerCase()+") precisam falar a mesma língua visual, da fachada ao digital.");
  if(has(a,"desafios_cv")) t4.push("Os desafios apontados — "+val(a,"desafios_cv").toLowerCase()+" — costumam vir de falta de sistema: definidos grid, tipografia e hierarquia, a consistência se torna natural.");
  if(t4.length) out.push({titulo:"Comunicação visual", texto:t4.join(" ")});
  var t5=[];
  if(has(a,"objetivos")) t5.push("Os objetivos ("+val(a,"objetivos").toLowerCase()+") devem orientar decisões de design pensadas para durar.");
  if(has(a,"expansao")) t5.push("Com expansão no horizonte ("+val(a,"expansao").toLowerCase()+"), vale criar padrões replicáveis desde já, evitando retrabalho a cada nova unidade.");
  if(has(a,"percepcao_futura")) t5.push("Para ser percebida como "+val(a,"percepcao_futura").toLowerCase()+", a marca precisa que cada ponto de contato físico antecipe essa imagem.");
  if(t5.length) out.push({titulo:"Prospecção futura", texto:t5.join(" ")});
  if(!out.length) out.push({titulo:"Visão geral", texto:"Preencha mais campos para uma análise mais rica. Com as respostas atuais, recomenda-se garantir coerência entre identidade, ambiente e comunicação visual."});
  return out;
}
function buildInsights(a){
  var ins=[];
  if(val(a,"identidade_atual")==="Não representa"||val(a,"identidade_atual")==="Está em revisão")
    ins.push({titulo:"Realinhar a identidade visual", prioridade:"alta", texto:"A identidade atual não traduz a essência. Defina um sistema visual (paleta, tipografia, aplicações) antes de investir em ambiente, para que tudo parta da mesma base."});
  if(val(a,"ambiente_comunica")==="Não comunica")
    ins.push({titulo:"Fazer o espaço contar a história da marca", prioridade:"alta", texto:"Use materiais, cor, luz e percurso como narrativa. Comece pelo primeiro ponto de impacto (entrada/vitrine), onde a percepção se forma em segundos."});
  else if(val(a,"ambiente_comunica")==="Em parte")
    ins.push({titulo:"Intensificar a presença da marca no ambiente", prioridade:"media", texto:"O espaço já comunica em parte. Reforce com elementos-assinatura repetidos — um material, uma cor de destaque, um gesto — para fixar a memória."});
  if(has(a,"problemas_ambiente"))
    ins.push({titulo:"Resolver os gargalos do ambiente primeiro", prioridade:"alta", texto:"Os problemas relatados afetam conforto e fluxo. Priorize-os: conforto e clareza de circulação sustentam toda a experiência."});
  if(has(a,"sinalizacao"))
    ins.push({titulo:"Estruturar o wayfinding", prioridade:"media", texto:"Crie uma hierarquia de sinalização (orientação > identificação > informação) com padrão único de tipografia, tamanho e posicionamento."});
  if(has(a,"desafios_cv"))
    ins.push({titulo:"Construir um sistema de comunicação visual", prioridade:"media", texto:"Defina grade, tipografia, uso de cor e regras de aplicação. Consistência entre fachada, impressos e digital aumenta percepção de valor."});
  if(has(a,"expansao"))
    ins.push({titulo:"Criar um manual replicável", prioridade:"media", texto:"Com expansão à vista, documente padrões de ambiente e marca (brand + retail book) para escalar sem perder identidade nem inflar custos."});
  if(has(a,"limitacoes"))
    ins.push({titulo:"Priorizar por impacto x custo", prioridade:"baixa", texto:"Diante das limitações, mapeie intervenções por relação impacto/investimento e execute em fases, começando pelas de maior retorno perceptivo."});
  if(ins.length<5) ins.push({titulo:"Unificar pontos de contato", prioridade:"media", texto:"Audite todos os pontos onde a marca aparece (físico e digital) e alinhe-os a uma única paleta e tipografia para fortalecer o reconhecimento."});
  if(ins.length<5) ins.push({titulo:"Desenhar a jornada no espaço", prioridade:"baixa", texto:"Mapeie o percurso do cliente — da calçada ao checkout — e desenhe cada etapa para reduzir atrito e ampliar o tempo de permanência."});
  return ins.slice(0,6);
}
function buildPaletas(a){
  var seeds = extractColors(val(a,"cores_principais")+" , "+val(a,"cores_secundarias"));
  if(!seeds.length) seeds = ["#2E5A57"];
  var base = hexToHsl(seeds[0]), sec = seeds[1] ? hexToHsl(seeds[1]) : null;
  var p1 = dedupe([
    mk(hslToHex(base.h, clamp(base.s-18,8,55), clamp(base.l+30,80,94)), "Tom claro de respiro", "Fundos amplos e paredes principais"),
    mk(hslToHex(base.h, base.s, base.l), "Cor-base da marca", "Identidade, elementos-assinatura"),
    mk(hslToHex(rot(base.h,-28), clamp(base.s-6,10,70), clamp(base.l+4,30,70)), "Análoga quente/fria", "Apoio, gradações, materiais"),
    mk(hslToHex(rot(base.h,28), clamp(base.s-6,10,70), clamp(base.l-2,28,68)), "Análoga complementar", "Mobiliário e superfícies secundárias"),
    mk(hslToHex(base.h, clamp(base.s+6,12,70), clamp(base.l-26,12,40)), "Sombra profunda", "Contraste, tipografia, marcenaria"),
    mk(hslToHex(base.h, 8, 95), "Neutro tingido", "Vazios e áreas de descanso visual"),
  ]);
  var compH = rot(base.h,180);
  var p2 = dedupe([
    mk(hslToHex(base.h, base.s, base.l), "Cor-base", "Presença principal da marca"),
    mk(hslToHex(compH, clamp(base.s+8,30,80), clamp(base.l,38,62)), "Complementar de destaque", "Pontos focais, sinalização, vitrine"),
    mk(hslToHex(rot(base.h,150), clamp(base.s,20,70), clamp(base.l+6,40,68)), "Split-complementar", "Detalhes e chamadas de atenção"),
    mk(sec ? hslToHex(sec.h, sec.s, sec.l) : hslToHex(compH, 14, 88), sec?"Segunda cor da marca":"Apoio claro", "Áreas amplas e respiro"),
    mk(hslToHex(base.h, clamp(base.s+10,12,40), 13), "Quase-preto tingido", "Base, texto, contraste máximo"),
  ]);
  var nh = base.h, ns = 8;
  var p3 = [
    mk(hslToHex(nh, ns-2, 95), "Off-white", "Paredes amplas e teto"),
    mk(hslToHex(nh, ns, 84), "Pedra clara", "Pisos claros, superfícies"),
    mk(hslToHex(nh, ns, 64), "Greige médio", "Têxteis e divisórias"),
    mk(hslToHex(nh, ns+2, 45), "Taupe", "Mobiliário e estrutura"),
    mk(hslToHex(nh, ns+3, 27), "Grafite", "Esquadrias, detalhes metálicos"),
    mk(hslToHex(nh, ns+4, 15), "Quase-preto", "Acabamentos de acento e contraste"),
  ];
  return [
    {nome:"Refinamento análogo", conceito:"Harmonia construída em torno da cor principal da marca — coesa e fiel à identidade atual.", cores:p1},
    {nome:"Contraste complementar", conceito:"A cor-base com seus opostos calibrados — para destaques, sinalização e pontos focais.", cores:p2},
    {nome:"Neutra arquitetônica", conceito:"Tons de baixa saturação no mesmo matiz, para acabamentos, paredes e mobiliário.", cores:p3},
  ];
}
function mk(hex,nome,uso){ return {hex:hex, nome:nome, uso:uso}; }
function dedupe(arr){ var seen={},out=[]; arr.forEach(function(c){var k=c.hex.toLowerCase(); if(!seen[k]){seen[k]=1;out.push(c);} }); return out; }

var NAMED = {
  "preto":"#1A1A1A","branco":"#FFFFFF","off-white":"#F4F1EA","branco quente":"#F4F1EA","creme":"#EFE7D6","marfim":"#F4EEE3",
  "cinza":"#808080","cinza claro":"#C9C7C2","cinza escuro":"#4A4A4A","grafite":"#2B2B2B","chumbo":"#3C3C3C",
  "vermelho":"#C0392B","vinho":"#6E1423","bordo":"#6E2A33","bordeaux":"#6E2A33","rosa":"#E27396","coral":"#E76F51",
  "laranja":"#E67E22","terracota":"#B5562F","tijolo":"#9C4A2B","ocre":"#C99A3B","mostarda":"#C9A227",
  "amarelo":"#F1C40F","dourado":"#C9A227","ouro":"#C9A227","verde":"#2E7D5B","verde escuro":"#1E4733",
  "verde musgo":"#4C5A3E","musgo":"#4C5A3E","oliva":"#6B7233","menta":"#9FD8C8","sage":"#9CA98B","salvia":"#9CA98B",
  "azul":"#2C5BA6","azul marinho":"#1B2A4A","marinho":"#1B2A4A","azul claro":"#6FA8DC","azul royal":"#2747A8",
  "ciano":"#1799A6","turquesa":"#1AA7A0","petroleo":"#1F4E5F","roxo":"#6C3483","violeta":"#7D3C98",
  "lilas":"#9B7EBD","purpura":"#6C3483","magenta":"#A83279","marrom":"#5C4326","marrom cafe":"#332420","cafe":"#332420","caramelo":"#A9742B",
  "bege":"#D8C3A5","areia":"#E4D2B4","nude":"#E2C2A8","taupe":"#8B8178","prata":"#BFC1C2","champagne":"#E6D5B8"
};
function deaccent(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase(); }
function extractColors(text){
  var found=[], t=text||"";
  var re=/#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})\b/g, m;
  while((m=re.exec(t))){ var h=m[0]; if(h.length===4) h="#"+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]; found.push(h.toUpperCase()); }
  var dt=deaccent(t);
  Object.keys(NAMED).sort(function(x,y){return y.length-x.length;}).forEach(function(name){
    if(dt.indexOf(deaccent(name))!==-1) found.push(NAMED[name]);
  });
  return dedupe(found.map(function(h){return {hex:h};})).map(function(o){return o.hex;});
}

/* ============================================================== *  COR — utilidades  * ============================================================== */
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function rot(h,d){ return ((h+d)%360+360)%360; }
function hexToRgb(hex){ var n=parseInt(hex.replace("#",""),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgba(hex,a){ var c=hexToRgb(hex); return "rgba("+c[0]+","+c[1]+","+c[2]+","+a+")"; }
function isLight(hex){ var c=hexToRgb(hex); return (0.299*c[0]+0.587*c[1]+0.114*c[2])>150; }
function hexToHsl(hex){
  var c=hexToRgb(hex), r=c[0]/255,g=c[1]/255,b=c[2]/255;
  var mx=Math.max(r,g,b), mn=Math.min(r,g,b), h=0,s=0,l=(mx+mn)/2,d=mx-mn;
  if(d){ s=l>0.5? d/(2-mx-mn): d/(mx+mn);
    if(mx===r) h=(g-b)/d+(g<b?6:0); else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; }
  return {h:Math.round(h), s:Math.round(s*100), l:Math.round(l*100)};
}
function hslToHex(h,s,l){
  h=((h%360)+360)%360; s=clamp(s,0,100)/100; l=clamp(l,0,100)/100;
  var c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2, r=0,g=0,b=0;
  if(h<60){r=c;g=x;} else if(h<120){r=x;g=c;} else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;} else if(h<300){r=x;b=c;} else {r=c;b=x;}
  var to=function(v){ return ("0"+Math.round((v+m)*255).toString(16)).slice(-2); };
  return ("#"+to(r)+to(g)+to(b)).toUpperCase();
}

render();
